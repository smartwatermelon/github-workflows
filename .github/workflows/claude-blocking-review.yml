name: Claude Blocking Review

# Reusable workflow: blocks PR merges when Claude finds bugs, reliability
# regressions, security issues, or data-loss risks.
#
# By default, review parameters are auto-estimated from the PR diff size:
#   - Model: sonnet (callers can override)
#   - max_turns: 10 + lines/150, +20% buffer (min 25, max 50)
#   - timeout: scaled from max_turns (min 4m, max 30m)
# Callers can override any parameter explicitly.
#
# Usage in a caller workflow:
#
#   permissions:
#     contents: read
#     pull-requests: write
#     issues: write
#     id-token: write
#
#   jobs:
#     claude-review:
#       uses: YOUR_ORG/github-workflows/.github/workflows/claude-blocking-review.yml@v1
#       with:
#         pr_number: ${{ github.event.pull_request.number }}
#         extra_instructions: |
#           Repo-specific guidance here.
#       secrets:
#         claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#
# The calling job name ("claude-review" above) becomes the required status
# check name: "Claude Blocking Review / claude-review / run-review" in branch protection.
#
# Escape hatch: add [skip-claude-review: reason] to the PR body to bypass
# enforcement with an audit trail.

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'Pull request number (pass github.event.pull_request.number)'
        type: number
        required: true
      extra_instructions:
        description: 'Repo-specific instructions appended to the base review prompt'
        type: string
        required: false
        default: ''
      max_turns:
        description: 'Maximum Claude API turns. 0 = auto-estimate from diff size. Callers can override.'
        type: number
        required: false
        default: 0
      timeout_minutes:
        description: 'Hard timeout for the Claude review step in minutes. 0 = auto-estimate from diff size.'
        type: number
        required: false
        default: 0
      model:
        description: 'Claude model ID. "auto" = sonnet. Callers can override with a specific model.'
        type: string
        required: false
        default: 'auto'
    secrets:
      claude_oauth_token:
        description: 'Claude Code OAuth token (CLAUDE_CODE_OAUTH_TOKEN secret)'
        required: true

jobs:
  run-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write  # required by claude-code-action for internal authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify caller permissions
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          if ! gh api "repos/${REPO}/pulls/${PR_NUMBER}" --silent 2>/dev/null; then
            echo "::error::Permission check failed."
            echo "::error::The caller workflow must declare top-level permissions:"
            echo "::error::  contents: read, pull-requests: write, issues: write, id-token: write"
            exit 1
          fi

      - name: Validate inputs
        env:
          MODEL: ${{ inputs.model }}
          MAX_TURNS: ${{ inputs.max_turns }}
          TIMEOUT: ${{ inputs.timeout_minutes }}
        run: |
          # Validate model: "auto" or alphanumeric/dots/hyphens
          if [ "$MODEL" != "auto" ] && ! echo "$MODEL" | grep -qE '^[a-zA-Z0-9._-]+$'; then
            echo "::error::Invalid model name. Must be 'auto' or match [a-zA-Z0-9._-]+"
            exit 1
          fi
          # Validate max_turns: 0 (auto) or 1-50
          if ! echo "$MAX_TURNS" | grep -qE '^[0-9]+$'; then
            echo "::error::max_turns must be a non-negative integer"
            exit 1
          fi
          if [ "$MAX_TURNS" -gt 50 ]; then
            echo "::error::max_turns must be between 0 and 50 (0 = auto)"
            exit 1
          fi
          # Validate timeout_minutes: 0 (auto) or 1-30
          if ! echo "$TIMEOUT" | grep -qE '^[0-9]+$'; then
            echo "::error::timeout_minutes must be a non-negative integer"
            exit 1
          fi
          if [ "$TIMEOUT" -gt 30 ]; then
            echo "::error::timeout_minutes must be between 0 and 30 (0 = auto)"
            exit 1
          fi

      - name: Check for doc-only diff
        id: doc-check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          # Short-circuit: diffs that only touch docs/meta files don't need a
          # paid Claude review — the BLOCK criteria (bug, reliability regression,
          # security, data-loss) don't apply to prose changes. Skips saves real
          # money per run and eliminates the "3 flakes in a row on a doc-only
          # PR" pattern observed in the 2026-04-17 AAR (kebab-tax#1162).
          FILES=$(gh pr diff "$PR_NUMBER" --repo "${GITHUB_REPOSITORY}" --name-only 2>/dev/null || echo "")
          if [ -z "$FILES" ]; then
            echo "::warning::Could not determine changed files — proceeding with review."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ALL_DOCS=true
          NON_DOC=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.md|*.markdown|*.rst|*.txt) ;;
              LICENSE|LICENSE.*|COPYING|COPYING.*) ;;
              CHANGELOG|CHANGELOG.*|HISTORY|HISTORY.*|AUTHORS|NOTICE) ;;
              .gitignore|.gitattributes|.editorconfig|.mailmap) ;;
              .github/ISSUE_TEMPLATE/*|.github/PULL_REQUEST_TEMPLATE.md) ;;
              .github/CODEOWNERS|.github/FUNDING.yml|.github/dependabot.yml) ;;
              docs/*|doc/*) ;;
              *) ALL_DOCS=false; NON_DOC="$f"; break ;;
            esac
          done <<< "$FILES"

          if [ "$ALL_DOCS" = "true" ]; then
            FILE_COUNT=$(printf '%s\n' "$FILES" | grep -c .)
            echo "::notice::Doc-only diff (${FILE_COUNT} file(s)) — skipping Claude review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "## Claude Code Review" >> "$GITHUB_STEP_SUMMARY"
            echo "**Verdict:** SKIPPED (doc-only diff, ${FILE_COUNT} file(s))" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Non-doc file present ('$NON_DOC') — proceeding with review."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Estimate review parameters
        id: estimate
        if: steps.doc-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          MODEL_INPUT: ${{ inputs.model }}
          MAX_TURNS_INPUT: ${{ inputs.max_turns }}
          TIMEOUT_INPUT: ${{ inputs.timeout_minutes }}
        run: |
          DIFF_LINES=$(gh pr diff "$PR_NUMBER" --repo "${GITHUB_REPOSITORY}" | wc -l | tr -d ' ')
          echo "Diff size: $DIFF_LINES lines"

          # --- Model selection ---
          if [ "$MODEL_INPUT" != "auto" ]; then
            MODEL="$MODEL_INPUT"
            echo "Model override: $MODEL"
          else
            MODEL="claude-sonnet-4-6"
            echo "Model: claude-sonnet-4-6"
          fi

          # --- Turn estimation ---
          # The fixed overhead of a review is high and varies by repo:
          #   - Read diff (1+ turns)
          #   - Read CLAUDE.md for conventions (repos can have 400+ line files)
          #   - Read each changed file for context (1+ turns per file)
          #   - Reason about findings
          #   - Write review, append verdict, post comment, write verdict file (3-4 turns)
          # Plus extra_instructions add repo-specific review scope.
          # Minimum 25 turns covers this overhead generously — unused turns are
          # free, only wall-clock time costs money, and the timeout is the real
          # cost guard. Scale up for large diffs.
          if [ "$MAX_TURNS_INPUT" -gt 0 ]; then
            MAX_TURNS="$MAX_TURNS_INPUT"
            echo "max_turns override: $MAX_TURNS"
          else
            ESTIMATED=$((10 + DIFF_LINES / 150))
            MAX_TURNS=$(( (ESTIMATED * 120 + 99) / 100 ))
            if [ "$MAX_TURNS" -lt 25 ]; then MAX_TURNS=25; fi
            if [ "$MAX_TURNS" -gt 50 ]; then MAX_TURNS=50; fi
            echo "Estimated turns: $ESTIMATED → allocated: $MAX_TURNS"
          fi

          # --- Timeout estimation ---
          # ~30s per turn as baseline, +20% buffer, minimum 4 minutes
          if [ "$TIMEOUT_INPUT" -gt 0 ]; then
            TIMEOUT="$TIMEOUT_INPUT"
            echo "timeout_minutes override: $TIMEOUT"
          else
            TIMEOUT_SECS=$(( MAX_TURNS * 30 * 120 / 100 ))
            TIMEOUT=$(( (TIMEOUT_SECS + 59) / 60 ))
            if [ "$TIMEOUT" -lt 4 ]; then TIMEOUT=4; fi
            if [ "$TIMEOUT" -gt 30 ]; then TIMEOUT=30; fi
            echo "Estimated timeout: ${TIMEOUT}m"
          fi

          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "max_turns=$MAX_TURNS" >> "$GITHUB_OUTPUT"
          echo "timeout_minutes=$TIMEOUT" >> "$GITHUB_OUTPUT"

          echo "### Review Parameters" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Diff lines | $DIFF_LINES |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Model | $MODEL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Max turns | $MAX_TURNS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timeout | ${TIMEOUT}m |" >> "$GITHUB_STEP_SUMMARY"

      - name: Minimize prior review comments
        if: steps.doc-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          # Collapse prior review comments tagged with the claude-blocking-review
          # marker. Keeps the PR conversation readable across multiple review
          # iterations (the AAR observed 4 stale reviews on kebab-tax#1165
          # polluting both the human-facing timeline and the post-push status
          # scraper). Non-fatal: any failure here must not block the review.
          OWNER="${REPO%/*}"
          NAME="${REPO#*/}"

          PRIOR_IDS=$(gh api graphql \
            -f query='query($owner: String!, $name: String!, $number: Int!) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  comments(first: 100) {
                    nodes { id body isMinimized }
                  }
                }
              }
            }' \
            -F owner="$OWNER" -F name="$NAME" -F number="$PR_NUMBER" \
            --jq '.data.repository.pullRequest.comments.nodes[] | select(.isMinimized == false) | select(.body | startswith("<!-- claude-blocking-review")) | .id' \
            2>/dev/null || echo "")

          if [ -z "$PRIOR_IDS" ]; then
            echo "No prior marked review comments to minimize."
            exit 0
          fi

          COUNT=0
          while IFS= read -r id; do
            [ -z "$id" ] && continue
            if gh api graphql \
                 -f query='mutation($id: ID!) { minimizeComment(input: {subjectId: $id, classifier: OUTDATED}) { clientMutationId } }' \
                 -F id="$id" >/dev/null 2>&1; then
              COUNT=$((COUNT + 1))
            else
              echo "::warning::Failed to minimize prior review comment $id"
            fi
          done <<< "$PRIOR_IDS"
          echo "Minimized $COUNT prior review comment(s) as OUTDATED."

      - name: Run Claude Code Review
        id: claude-review
        if: steps.doc-check.outputs.skip != 'true'
        timeout-minutes: ${{ fromJSON(steps.estimate.outputs.timeout_minutes) }}
        continue-on-error: true  # infrastructure failure must not block merges
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.claude_oauth_token }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ inputs.pr_number }}

            SCOPE CONSTRAINTS — follow these strictly:
            - Read the PR diff using `gh pr diff`
            - Read changed files for immediate context around modified lines
            - Do NOT explore the broader codebase, run tests, or investigate unrelated files
            - Focus your review on the diff — do not review unchanged code
            - Complete your review in as few steps as possible

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or logic errors
            - Reliability regressions (something that used to work may now break)
            - Security concerns
            - Test coverage for changed behavior

            Use the repository's CLAUDE.md for guidance on style and conventions.
            Be constructive and specific — cite file names and line numbers where possible.
            When listing non-blocking observations, order them by maintenance impact:
            issues that will predictably cause test drift or duplicated bugs should
            appear before stylistic or organizational notes.

            ${{ inputs.extra_instructions != '' && format('---\n\nAdditional instructions for this repository:\n\n{0}', inputs.extra_instructions) || '' }}

            ---

            VERDICT INSTRUCTIONS — follow these exactly:

            Determine your verdict based on the review findings:

            Use VERDICT: BLOCK if ANY of the following are true:
            - You found a clear bug that causes incorrect behavior in production (wrong
              calculation, incorrect condition, off-by-one that affects real data)
            - You found a reliability regression: a previously working feature or pipeline
              path may now fail because of changes in this PR
            - You found a security vulnerability: hardcoded credentials, unvalidated user
              input reaching a privileged operation, or an auth check that can be bypassed
            - You found missing error handling on an async operation that would cause a
              silent failure or surface a raw exception to the user
            - You found a risk of data loss or data corruption

            Use VERDICT: PASS in all other cases, including:
            - Style and naming issues
            - Test coverage gaps that do not affect existing behavior
            - Performance concerns without measurable impact
            - Documentation gaps
            - Code organization suggestions
            - Informational warnings

            EVIDENCE STANDARD FOR RELIABILITY REGRESSION BLOCKs:

            You cannot run the test suite. When claiming a test will fail or a code
            path will regress, you must trace the execution path from entry point to
            the specific assertion or failure point, with line-number citations at each
            step. If your trace relies on assumed execution order you have not verified
            in the diff or source, downgrade to PASS with a named observation instead.

              ❌ "validateEntitlements() is now called before CLAUDE_API_KEY is checked,
                 so the 503 test will fail." → Requires verifying actual call order. If
                 you cannot cite the lines proving that order, issue PASS.

              ✓ "Line 42 calls foo(), which at line 71 sets X to null; the assertion at
                 line 265 expects X to be non-null — that assertion will fail." → BLOCK.

              ✓ "The test fixture at line 48 does not set REVENUECAT_API_SECRET, but the
                 handler reads it at line 89 and returns early if absent — the test will
                 never reach the code path it claims to exercise." → BLOCK.

            When uncertain between BLOCK and PASS, default to PASS.

            You MUST complete ALL of the following steps in order:

            Step 1 — Write your review to /tmp/review.md

            Step 2 — Append the machine-readable verdict as the last line of the review:
              echo "" >> /tmp/review.md
              echo "VERDICT: PASS" >> /tmp/review.md
              # OR (if blocking issues found):
              echo "VERDICT: BLOCK" >> /tmp/review.md

            Step 3 — Post the review as a PR comment. The body MUST begin with a
            machine-readable marker line, then a blank line, then the review
            content (which already ends with the VERDICT line from Step 2).
            Run these three commands verbatim — do NOT omit or edit the marker:

              printf '<!-- claude-blocking-review sha=%s run=%s -->\n\n' '${{ github.event.pull_request.head.sha }}' '${{ github.run_id }}' > /tmp/review-final.md
              cat /tmp/review.md >> /tmp/review-final.md
              gh pr comment ${{ inputs.pr_number }} --body-file /tmp/review-final.md

            The marker lets downstream tooling (status scrapers, the
            "Minimize prior review comments" step on the next run) identify
            reviews produced by this workflow and associate each one with
            its reviewed commit. Omitting it breaks those consumers.

            Step 4 — Write the verdict to the verdict file:
              echo "VERDICT: PASS" > /tmp/review-verdict.txt
              # OR:
              echo "VERDICT: BLOCK" > /tmp/review-verdict.txt

            The verdict file (Step 4) is the primary signal read by CI. The verdict line
            appended to the comment (Step 2) is the fallback. Both must match.

          claude_args: '--max-turns ${{ steps.estimate.outputs.max_turns }} --model ${{ steps.estimate.outputs.model }} --allowed-tools "Read,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(echo *),Bash(cat *),Bash(tee *),Bash(printf *)"'

      - name: Check review verdict
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          CLAUDE_OUTCOME: ${{ steps.claude-review.outcome }}
          DOC_SKIP: ${{ steps.doc-check.outputs.skip }}
        run: |
          # Short-circuit: doc-only diff already wrote its summary in the
          # Check for doc-only diff step. Nothing to verify, nothing to block.
          if [ "$DOC_SKIP" = "true" ]; then
            echo "Doc-only skip — no verdict required."
            exit 0
          fi

          # Escape hatch: [skip-claude-review] or [skip-claude-review: reason] in PR body
          # bypasses enforcement. The extended regex matches both the bare token and the
          # documented `: reason` form advertised by our error messages. See issue #38
          # for the prior -F fixed-string pattern that only matched the bare form.
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q .body 2>/dev/null || echo "")
          if echo "$PR_BODY" | grep -qE '\[skip-claude-review(\]|:)'; then
            echo "::notice::Claude Code Review enforcement skipped via [skip-claude-review] marker in PR body."
            echo "## Claude Code Review" >> "$GITHUB_STEP_SUMMARY"
            echo "**Verdict:** SKIPPED (override in PR body)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          VERDICT_FILE="/tmp/review-verdict.txt"
          VERDICT=""

          if [ -f "$VERDICT_FILE" ]; then
            VERDICT=$(head -1 "$VERDICT_FILE")
            echo "Verdict source: file"
          else
            # Fallback: Claude sometimes includes the verdict in the comment body
            # instead of writing a separate file. Parse the most recent PR comment.
            echo "::warning::Verdict file not found — falling back to PR comment parsing."
            COMMENT=$(gh pr view "$PR_NUMBER" --json comments -q '.comments[-1].body' 2>/dev/null || echo "")
            if echo "$COMMENT" | grep -q "VERDICT: BLOCK"; then
              VERDICT="VERDICT: BLOCK"
              echo "Verdict source: PR comment (fallback)"
            elif echo "$COMMENT" | grep -q "VERDICT: PASS"; then
              VERDICT="VERDICT: PASS"
              echo "Verdict source: PR comment (fallback)"
            else
              # No verdict found — distinguish exhaustion from infrastructure failure
              if [ "$CLAUDE_OUTCOME" = "failure" ]; then
                echo "::error::Review did not complete (likely exceeded turn limit or timed out). No verdict rendered."
                echo "::error::Re-push to retry, or add [skip-claude-review: reason] to the PR body to bypass."
                echo "## Claude Code Review" >> "$GITHUB_STEP_SUMMARY"
                echo "**Verdict:** INCOMPLETE — review exceeded turn limit or timed out." >> "$GITHUB_STEP_SUMMARY"
                echo "Re-push to retry or add \`[skip-claude-review: reason]\` to bypass." >> "$GITHUB_STEP_SUMMARY"
                exit 1
              else
                echo "::warning::No verdict found but Claude step did not fail. Defaulting to PASS (infrastructure issue)."
                echo "## Claude Code Review" >> "$GITHUB_STEP_SUMMARY"
                echo "**Verdict:** UNKNOWN (infrastructure issue — defaulting to PASS)" >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
            fi
          fi
          echo "Review verdict: $VERDICT"
          echo "## Claude Code Review" >> "$GITHUB_STEP_SUMMARY"

          if echo "$VERDICT" | grep -q "VERDICT: BLOCK"; then
            echo "**Verdict:** BLOCK" >> "$GITHUB_STEP_SUMMARY"
            echo "See the PR comment for details on the blocking issue(s)." >> "$GITHUB_STEP_SUMMARY"
            echo "To override after reviewing: add \`[skip-claude-review: reason]\` to the PR body." >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Claude Code Review found blocking issues. See the PR comment for details. To override: add [skip-claude-review: reason] to the PR body."
            exit 1
          elif echo "$VERDICT" | grep -q "VERDICT: PASS"; then
            echo "**Verdict:** PASS" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          else
            echo "::warning::Unexpected verdict format: '$VERDICT'. Expected 'VERDICT: PASS' or 'VERDICT: BLOCK'. Defaulting to PASS."
            echo "**Verdict:** UNKNOWN (unexpected format — defaulting to PASS)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
